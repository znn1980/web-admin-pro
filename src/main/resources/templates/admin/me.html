<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh">
<head>
    <meta charset="utf-8">
    <title th:text="|${config.title} v${config.version}|">WEB-ADMIN-PRO</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="shortcut icon" type="image/x-icon" th:href="@{/favicon.ico}" href="../../static/favicon.ico"/>
    <link rel="stylesheet" th:href="@{/layui/css/layui.css}" href="../../static/layui/css/layui.css" media="all">
    <link rel="stylesheet" th:href="@{/admin-ui/css/admin.css}" href="../../static/admin-ui/css/admin.css" media="all">
    <link rel="stylesheet" th:href="@{/style/template.css}" href="../../static/style/template.css" media="all">
</head>
<body>
<div class="layui-fluid ">
    <div class="layui-row layui-col-space8">
        <div class="layui-col-md3">
            <div class="layadmin-homepage-panel layadmin-homepage-shadow">
                <div class="layui-card">
                    <div class="layui-card-header">个人资料</div>
                    <div class="layui-card-body">
                        <div class="layadmin-homepage-pad-ver text-center">
                            <img id="sys-avatar" class="layadmin-homepage-pad-img" width="120" height="120" alt="" lay-tips="点击修改头像"
                                 th:src="@{/style/imgs/avatar/default_beauty.jpg}"
                                 src="../../static/style/imgs/avatar/default_beauty.jpg"
                                 th:onerror="|this.onerror=null;this.src='@{/style/imgs/avatar/default_beauty.jpg}';|">
                        </div>
                        <ul class="layadmin-homepage-list-group">
                            <li class="list-group-item">
                                <i class="layui-icon layui-icon-username"></i>登录账号
                                <span style="float: right;" id="sys-username"></span>
                            </li>
                            <hr>
                            <li class="list-group-item">
                                <i class="layui-icon layui-icon-cellphone"></i>手机号码
                                <span style="float: right;" id="sys-mobile"></span>
                            </li>
                            <hr>
                            <li class="list-group-item">
                                <i class="layui-icon layui-icon-email"></i>邮箱地址
                                <span style="float: right;" id="sys-email"></span>
                            </li>
                            <hr>
                            <li class="list-group-item">
                                <i class="layui-icon layui-icon-location"></i>登录地址
                                <span style="float: right;" id="sys-ip"></span>
                            </li>
                            <hr>
                            <li class="list-group-item">
                                <i class="layui-icon layui-icon-date"></i>创建时间
                                <span style="float: right;" id="sys-timestamp"></span>
                            </li>
                            <hr>
                            <li class="list-group-item">
                                <i class="layui-icon layui-icon-auz"></i>安全设置
                                <button style="float: right;" type="button" id="sys-password" class="layui-btn layui-btn-xs layui-bg-red">修改密码</button>
                            </li>
                            <hr>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
        <div class="layui-col-md9">
            <div class="layui-card">
                <div class="layui-card-header">基本资料</div>
                <div class="layui-card-body">
                    <div class="layui-tabs" id="sys-tabs" lay-filter="sys-tabs">
                        <ul class="layui-tabs-header">
                            <li>用户资料</li>
                            <li>修改密码</li>
                            <li>操作日志</li>
                        </ul>
                        <div class="layui-tabs-body">
                            <div class="layui-tabs-item">
                                <form class="layui-form" id="sys-user-form" lay-filter="sys-user-form">
                                    <div class="layui-form-item">
                                        <label class="layui-form-label" for="mobile">手机号码</label>
                                        <div class="layui-input-block">
                                            <input type="hidden" id="avatar" name="avatar">
                                            <input type="text" id="mobile" name="mobile" value="" lay-verify="required|phone" placeholder="手机号码" lay-reqtext="请输入手机号码" autocomplete="off" class="layui-input" lay-affix="clear">
                                        </div>
                                    </div>
                                    <div class="layui-form-item">
                                        <label class="layui-form-label" for="email">邮箱地址</label>
                                        <div class="layui-input-block">
                                            <input type="text" id="email" name="email" value="" lay-verify="required|email" placeholder="邮箱地址" lay-reqtext="请输入邮箱地址" autocomplete="off" class="layui-input" lay-affix="clear">
                                        </div>
                                    </div>
                                    <div class="layui-form-item">
                                        <label class="layui-form-label" for="remark">用户备注</label>
                                        <div class="layui-input-block">
                                            <input type="text" id="remark" name="remark" value="" placeholder="用户备注" autocomplete="off" class="layui-input" lay-affix="clear">
                                        </div>
                                    </div>
                                    <div class="layui-form-item ">
                                        <div class="layui-input-block">
                                            <button type="button" lay-submit class="layui-btn layui-btn-radius" lay-filter="sys-user-submit" id="sys-user-submit">
                                                <i class="layui-icon layui-icon-ok"></i>保存
                                            </button>
                                            <button type="button" class="layui-btn layui-btn-radius layui-bg-red">
                                                <i class="layui-icon layui-icon-close"></i>关闭
                                            </button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                            <div class="layui-tabs-item">
                                <form class="layui-form" id="password-form" lay-filter="password-form">
                                    <div class="layui-form-item">
                                        <label class="layui-form-label" for="oldPassword">旧密码</label>
                                        <div class="layui-input-block">
                                            <input type="password" id="oldPassword" name="oldPassword" value="" lay-verify="required" placeholder="旧密码" lay-reqtext="请输入旧密码" autocomplete="off" class="layui-input" lay-affix="eye">
                                        </div>
                                    </div>
                                    <div class="layui-form-item">
                                        <label class="layui-form-label" for="newPassword">新密码</label>
                                        <div class="layui-input-block">
                                            <input type="password" id="newPassword" name="newPassword" value="" lay-verify="required" placeholder="新密码" lay-reqtext="请输入新密码" autocomplete="off" class="layui-input" lay-affix="eye">
                                        </div>
                                    </div>
                                    <div class="layui-form-item">
                                        <label class="layui-form-label" for="confirmPassword">确认密码</label>
                                        <div class="layui-input-block">
                                            <input type="password" id="confirmPassword" name="confirmPassword" value="" lay-verify="required" placeholder="确认密码" lay-reqtext="请确认密码" autocomplete="off" class="layui-input" lay-affix="eye">
                                        </div>
                                    </div>
                                    <div class="layui-form-item ">
                                        <div class="layui-input-block">
                                            <button type="button" lay-submit class="layui-btn layui-btn-radius" lay-filter="password-submit" id="password-submit">
                                                <i class="layui-icon layui-icon-ok"></i>保存
                                            </button>
                                            <button type="button" class="layui-btn layui-btn-radius layui-bg-red">
                                                <i class="layui-icon layui-icon-close"></i>关闭
                                            </button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                            <div class="layui-tabs-item layui-form">
                                <div class="layui-form-item layui-form-pane">
                                    <div class="layui-inline">
                                        <label class="layui-form-label">日期范围</label>
                                        <div class="layui-input-inline">
                                            <label for="timestamp"></label>
                                            <input type="text" class="layui-input" id="timestamp" readonly placeholder="日期范围">
                                        </div>
                                    </div>
                                    <!--更多查询条件的例子，没有实际作用，只作为演示使用。-->
                                    <!--div class="layui-inline more" style="display: none;"></div-->
                                    <div class="layui-inline">
                                        <div class="layui-btn-group">
                                            <button layadmin-event="search" class="layui-btn layui-btn-sm">
                                                <i class="layui-icon layui-icon-search"></i>查询
                                            </button>
                                            <button layadmin-event="refresh" class="layui-btn layui-btn-sm layui-bg-orange">
                                                <i class="layui-icon layui-icon-refresh"></i>重置
                                            </button>
                                            <button id="more" layadmin-event="more" class="layui-btn layui-btn-sm layui-bg-blue layui-icon layui-icon-down">展开</button>
                                        </div>
                                    </div>
                                    <table class="layui-hide" id="sys-log-table" lay-filter="sys-log-table"></table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script type="text/html" id="name-tpl">
    <span lay-tips="{{d.name}}">{{d.name}}</span>
</script>
<script type="text/html" id="ip-tpl">
    <span lay-tips="{{d.method}}:{{d.url}}">{{d.ip}}</span>
</script>
<script type="text/html" id="ms-tpl">
    <span class="layui-badge layui-bg-orange">{{d.ms/1000}}</span>
</script>
<script type="text/html" id="timestamp-tpl">
    <span lay-tips="{{d.timestamp}}">{{d.timestamp}}</span>
</script>
<script type="text/html" id="sys-log-toolbar">
    <div class="layui-btn-group">
        <button class="layui-btn layui-btn-sm layui-bg-red" lay-event="delete-toolbar">
            <i class="layui-icon layui-icon-delete"></i>删除
        </button>
        <button class="layui-btn layui-btn-sm layui-bg-orange" lay-event="refresh-toolbar">
            <i class="layui-icon layui-icon-refresh"></i>刷新
        </button>
    </div>
</script>
<script type="text/html" id="sys-log-tool">
    <button class="layui-btn layui-btn-xs layui-bg-blue" lay-event="logs-tool">
        <i class="layui-icon layui-icon-search"></i>详细
    </button>
</script>
<script th:src="@{/layui/layui.js}" src="../../static/layui/layui.js"></script>
<script th:inline="javascript">
    layui.config({
        base: /*[[@{/}]]*/ '../../static/'
        , version: true
    }).use(['index'], function () {

        layui.$('#sys-avatar').on('click', function () {
            const avatar = layui.$('#avatar').val();
            layui.admin.popup({
                id: 'sys-avatar'
                , type: 2, anim: -1, shadeClose: true
                , title: '修改头像', area: ['460px', '350px']
                , skin: 'layadmin-note layui-anim layui-anim-upbit'
                , content: /*[[@{/views/template/avatar.html}]]*/ '../../static/views/template/avatar.html'
                , end: function () {
                    if (avatar !== layui.$('#avatar').val()) layui.$('#sys-user-submit').trigger("click");
                }
            });
        });

        layui.$('#sys-password').on('click', function () {
            layui.tabs.change('sys-tabs', 1);
        });

        layui.laydate.render({
            elem: '#timestamp', range: ':'
            , value: `${ymd()} : ${ymd(86400000)}`
        });


        layui.table.render({
            elem: '#sys-log-table'
            , url: /*[[@{/sys/log/user/page}]]*/ '/sys/log/user/page'
            , method: 'POST', contentType: "application/json;charset=UTF-8"
            , where: {
                startTimestamp: (layui.$('#timestamp').val().split(":")[0]
                    || ymd()).trim() + ' 00:00:00'
                , endTimestamp: (layui.$('#timestamp').val().split(":")[1]
                    || ymd(86400000)).trim() + ' 00:00:00'
            }
            , page: true
            , toolbar: '#sys-log-toolbar'
            , cols: [
                [
                    {type: 'checkbox'}
                    , {field: 'username', title: '用户', width: 80}
                    , {field: 'name', title: '描述', templet: '#name-tpl'}
                    , {field: 'ip', title: 'IP地址', width: 110, templet: '#ip-tpl'}
                    , {field: 'os', title: '系统', width: 110}
                    , {field: 'browser', title: '浏览器', width: 100}
                    , {field: 'ms', title: '耗时', align: 'right', width: 80, templet: '#ms-tpl'}
                    , {field: 'timestamp', title: '创建时间', width: 110, templet: '#timestamp-tpl'}
                    , {title: '操作', align: 'center', toolbar: '#sys-log-tool', width: 80}
                ]
            ]
        });

        layui.table.on('toolbar(sys-log-table)', function (e) {
            if (e.event === 'delete-toolbar') {
                const logs = layui.table.checkStatus('sys-log-table').data;
                if (logs.length <= 0) {
                    layui.layer.msg("请选择一条纪录！");
                } else {
                    layui.layer.confirm(`是否删除【${logs.length}】条日志？`, {
                        title: '删除', closeBtn: 0, skin: 'layui-layer-admin'
                    }, function (index) {
                        layui.layer.close(index);
                        req(/*[[@{/sys/log}]]*/ '/sys/log', 'DELETE', logs.map(log => log.id), function (data) {
                            layui.layer.msg(data.msg);
                            layui.table.reload('sys-log-table');
                        });
                    });
                }
            }
            if (e.event === 'refresh-toolbar') {
                layui.table.reload('sys-log-table');
            }
        });

        layui.table.on('tool(sys-log-table)', function (e) {
            if (e.event === 'logs-tool') {
                const logs = [];
                if (e.data.params) logs.push(`<pre id="sys-params" class="layui-code">${e.data.params}</pre>`);
                if (e.data.result) logs.push(`<br><pre id="sys-result" class="layui-code">${e.data.result}</pre>`);
                if (e.data.errors) logs.push(`<br><pre id="sys-errors" class="layui-code">${e.data.errors}</pre>`);
                layui.admin.popup({
                    type: 1, title: '详细信息', area: 'auto'
                    , content: logs.join('')
                    , success: function () {
                        if (e.data.params) layui.code({elem: '#sys-params', theme: 'dark', wordWrap: true, header: true, text: {code: '请求参数'}});
                        if (e.data.result) layui.code({elem: '#sys-result', theme: 'dark', wordWrap: true, header: true, text: {code: '返回参数'}});
                        if (e.data.errors) layui.code({elem: '#sys-errors', theme: 'dark', wordWrap: false, header: true, text: {code: '异常信息'},});
                    }
                });
            }
        });

        layui.admin.events.search = function () {
            layui.table.reload('sys-log-table', {
                where: {
                    startTimestamp: (layui.$('#timestamp').val().split(":")[0]
                        || ymd()).trim() + ' 00:00:00'
                    , endTimestamp: (layui.$('#timestamp').val().split(":")[1]
                        || ymd(86400000)).trim() + ' 00:00:00'
                }
                , page: {curr: 1}
            });
        }

        layui.admin.events.refresh = function () {
            layui.laydate.render({
                elem: '#timestamp', range: ':'
                , value: `${ymd()} : ${ymd(86400000)}`
            });
        }

        layui.admin.events.more = function () {
            layui.$("div[name='more']").toggle();
            layui.$('#more').html(layui.$('#more').html() === '\n收起' ? '\n展开' : '\n收起')
                .toggleClass('layui-icon-down').toggleClass('layui-icon-up');
        }

        layui.form.on('submit(sys-user-submit)', function (data) {
            req(/*[[@{/sys/user}]]*/ '/sys/user', 'PUT', data.field, function (data) {
                layui.layer.msg(data.msg);
                load(data.data);
            });
        });

        layui.form.on('submit(password-submit)', function (data) {
            req(/*[[@{/sys/user/password}]]*/ '/sys/user/password', 'PUT', data.field, function (data) {
                layui.layer.msg(data.msg);
                layui.$('#password-form')[0].reset();
            });
        });

        req(/*[[@{/sys/user}]]*/ '/sys/user', 'GET', null, function (data) {
            load(data.data);
        });

        function req(url, type, data, done) {
            layui.admin.req({
                url: url, type: type, data: JSON.stringify(data), contentType: "application/json;charset=UTF-8"
                , beforeSend: function () {
                    layui.layer.load();
                }
                , complete: function () {
                    layui.layer.closeAll('loading');
                }
                , done: function (data) {
                    done(data);
                }
            });
        }

        function load(data) {
            if (data.avatar) layui.$('#sys-avatar').attr('src', data.avatar);
            layui.$('#sys-username').html(data.username);
            layui.$('#sys-mobile').html(data.mobile);
            layui.$('#sys-email').html(data.email);
            layui.$('#sys-ip').html(data.ip);
            layui.$('#sys-timestamp').html(data.createTimestamp);
            layui.form.val('sys-user-form', data);
        }

        function ymd(ms) {
            return layui.util.toDateString(Date.now() + ((ms) ? ms : 0), 'yyyy-MM-dd');
        }
    });
</script>
</body>
</html>
