<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh">
<head>
    <meta charset="utf-8">
    <title>抱歉，服务器出错了！</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="shortcut icon" type="image/x-icon" th:href="@{/favicon.ico}" href="../../static/favicon.ico"/>
    <link rel="stylesheet" th:href="@{/layui/css/layui.css}" href="../../static/layui/css/layui.css" media="all">
    <link rel="stylesheet" th:href="@{/admin-ui/css/admin.css}" href="../../static/admin-ui/css/admin.css" media="all">
    <link rel="stylesheet" th:href="@{/style/error-page.css}" href="../../static/style/error-page.css" media="all">
</head>
<body>
<div class="error-page">
    <img class="error-page-img" th:src="@{/style/imgs/error/500.png}" src="../../static/style/imgs/error/500.png" alt="500">
    <div class="error-page-info">
        <h1>500</h1>
        <p>抱歉，服务器出错了！</p>
        <div>
            <a th:if="${error}" class="layui-btn layui-bg-red">详细错误</a>
            <a th:href="@{/admin/login.html}" target="_top" class="layui-btn">返回登陆页</a>
        </div>
    </div>
</div>
<div class="layui-hide">
    <pre class="layui-code" th:text="${error}"></pre>
</div>
<script th:src="@{/layui/layui.js}" src="../../static/layui/layui.js"></script>
<script th:inline="javascript">
    const config = {
        base:/*[[@{/}]]*/ '../../static/'
    }

    layui.config({
        base: config.base, version: true
    }).use(['index', 'common'], function () {

        layui.code({elem: '.layui-code', theme: 'dark', header: false, wordWrap: false});

        layui.$('.layui-bg-red').on('click', function () {
            layui.layer.open({
                type: 1, shade: false, title: false, area: 'auto'
                , content: layui.$('.layui-hide').html()
            });
        });
    });
</script>
</body>
</html>
