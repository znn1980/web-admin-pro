config:
  title: WEB-ADMIN-PRO
  version: 1.0.0
  copyright: © 2025 All Rights Reserved.

server:
  port: 80

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/web-admin-pro?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  session:
    jdbc:
      initialize-schema: always
  web:
    resources:
      chain:
        strategy:
          content:
            enabled: true
            paths: /**
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

logging:
  level:
    com.admin.web: info
  file:
    path: /
    name: logs/web-admin-pro.log