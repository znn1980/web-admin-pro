config:
  title: WEB-ADMIN-PRO
  version: 1.0.0
  copyright: © 2025 All Rights Reserved.

server:
  port: 80
  ssl:
    enabled: false
    key-store: classpath:keystore.jks
    key-store-password: 123456

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/web-admin-pro?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  session:
    jdbc:
      initialize-schema: ALWAYS
  web:
    resources:
      chain:
        strategy:
          content:
            enabled: true
  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 10MB

logging:
  level:
    com.admin.web: info
  file:
    name: logs/web-admin-pro.log