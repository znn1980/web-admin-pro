config:
  name: WEB-ADMIN-PRO
  version: 1.3.0
  copyright: © 2026 All Rights Reserved.
  upload:
    location: uploads
    extensions:
      - image/*

server:
  port: 443
  ssl:
    enabled: true
    key-store: classpath:keystore.jks
    key-store-password: 123456

spring:
  application:
    name: ${config.name}
    version: ${config.version}
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/web-admin-pro
    username: postgres
    password: postgres
  jpa:
    generate-ddl: true
    show-sql: true
    open-in-view: true
  session:
    jdbc:
      initialize-schema: always
  web:
    resources:
      chain:
        strategy:
          content:
            enabled: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
      file-size-threshold: 5KB
  ai:
    openai:
      api-key:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        completions-path: /v1/chat/completions
        options:
          model: qwen-plus
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always

logging:
  level:
    com.admin.web: info
    org.springframework.ai: debug
  file:
    name: logs/web-admin-pro.log