config:
  name: WEB-ADMIN-PRO
  version: 1.2.0
  copyright: © 2026 All Rights Reserved.
  upload:
    location: uploads
    extensions:
      - image/*

server:
  port: 80

spring:
  application:
    name: ${config.name}
    version: ${config.version}
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/web-admin-pro
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    open-in-view: true
  session:
    jdbc:
      initialize-schema: always
  web:
    resources:
      chain:
        strategy:
          content:
            enabled: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
      file-size-threshold: 5KB
  ai:
    openai:
      api-key:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        completions-path: /v1/chat/completions
        options:
          model: qwen-plus
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always

logging:
  level:
    com.admin.web: info
    org.springframework.ai: debug
  file:
    name: logs/web-admin-pro.log